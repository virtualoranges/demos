


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — ZAPP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#FDF6EE; --peach:#F5E6D8; --coral:#E8846A; --coral-d:#C96850;
    --teal:#4ABFB0; --ink:#2A2118; --mid:#6B5B4E; --light:#A89080;
    --white:#FFFFFF; --shadow:0 4px 24px rgba(90,50,20,.10);
    --shadow-lg:0 12px 48px rgba(90,50,20,.16);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden;}

  /* BG */
  .bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .b1{position:absolute;width:500px;height:500px;border-radius:50%;background:#F5C5A8;filter:blur(80px);opacity:.32;top:-150px;right:-100px;}
  .b2{position:absolute;width:350px;height:350px;border-radius:50%;background:#B8E8E0;filter:blur(70px);opacity:.28;bottom:0;left:-80px;}

  /* LAYOUT */
  .page{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;}

  /* BRAND */
  .brand{text-align:center;margin-bottom:36px;}
  .brand-logo{font-family:'Bricolage Grotesque',sans-serif;font-size:42px;font-weight:800;background:linear-gradient(135deg,var(--coral),#D97A5E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px;}
  .brand-tag{font-size:14px;color:var(--light);margin-top:4px;font-weight:300;}

  /* CARD */
  .card{background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-radius:24px;box-shadow:var(--shadow-lg);border:1.5px solid rgba(255,255,255,.8);padding:40px 36px;width:100%;max-width:420px;}
  .card-title{font-family:'Bricolage Grotesque',sans-serif;font-size:26px;font-weight:800;margin-bottom:6px;}
  .card-sub{font-size:14px;color:var(--light);margin-bottom:28px;font-weight:300;}

  /* FORM */
  .form-group{margin-bottom:16px;}
  label{display:block;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;color:var(--mid);margin-bottom:7px;}
  input[type=email],input[type=password],input[type=text]{
    width:100%;padding:13px 16px;border-radius:12px;
    border:2px solid rgba(200,160,130,.22);background:var(--white);
    font-family:'DM Sans',sans-serif;font-size:15px;color:var(--ink);outline:none;
    transition:border-color .2s,box-shadow .2s;
  }
  input:focus{border-color:var(--coral);box-shadow:0 0 0 4px rgba(232,132,106,.12);}
  input::placeholder{color:var(--light);}

  /* BUTTON */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:50px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;transition:all .22s;margin-top:8px;}
  .btn-primary{background:linear-gradient(135deg,var(--coral),#D97A5E);color:#fff;box-shadow:0 6px 20px rgba(232,132,106,.38);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(232,132,106,.48);}

  /* ERROR */
  .error-box{background:#FFF0EE;border:1.5px solid rgba(232,132,106,.4);border-radius:12px;padding:12px 16px;margin-bottom:20px;font-size:14px;color:var(--coral-d);}

  /* LINKS */
  .card-footer{text-align:center;margin-top:24px;font-size:14px;color:var(--mid);}
  .card-footer a{color:var(--coral);font-weight:500;text-decoration:none;}
  .card-footer a:hover{text-decoration:underline;}
  .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--light);font-size:12px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(200,160,130,.25);}

  /* FOOTER NOTE */
  .page-footer{text-align:center;padding:20px;font-size:12px;color:var(--light);position:relative;z-index:1;}
  .page-footer a{color:var(--light);text-decoration:none;}
  .page-footer a:hover{color:var(--coral);}

  /* FEATURES PILLS */
  .features{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:32px;}
  .feat{background:rgba(255,255,255,.75);border:1.5px solid rgba(200,160,130,.22);border-radius:50px;padding:6px 14px;font-size:12px;color:var(--mid);font-weight:500;}
</style>
</head>
<body>
<div class="bg"><div class="b1"></div><div class="b2"></div></div>
<br><br><br>

</html>
